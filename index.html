<style>

  }
  body.theme-amber { --bg: #0a0600; --bg-panel: #120800; --bg-input: #0a0500; --fg: #ffb000; --fg-dim: #7a5a00; --fg-bright: #ffd980; --fg-muted: #8a6a20; --accent: #ff8800; --warn: #ffe060; --err: #ff4444; --magenta: #ff66dd; --border: rgba(255, 176, 0, 0.15); --border-bright: rgba(255, 176, 0, 0.4); --glow: 0 0 8px rgba(255, 176, 0, 0.5); }
  body.theme-cyan { --bg: #030608; --bg-panel: #060f14; --bg-input: #040a0e; --fg: #00d4ff; --fg-dim: #1a6680; --fg-bright: #80e8ff; --fg-muted: #3a7a90; --accent: #00ffcc; --warn: #ffcc00; --err: #ff3366; --magenta: #ff44aa; --border: rgba(0, 212, 255, 0.15); --border-bright: rgba(0, 212, 255, 0.4); --glow: 0 0 8px rgba(0, 212, 255, 0.5); }
  body.theme-matrix { --bg: #000300; --bg-panel: #001500; --bg-input: #000a00; --fg: #00ff41; --fg-dim: #1a7a2a; --fg-bright: #80ff80; --fg-muted: #3a8a4a; --accent: #00cc33; --warn: #ffcc00; --err: #ff3333; --magenta: #ff44aa; --border: rgba(0, 255, 65, 0.15); --border-bright: rgba(0, 255, 65, 0.4); --glow: 0 0 8px rgba(0, 255, 65, 0.5); }
  
  /* CLI Mode Theme Overlay */
  body.cli-mode {
    --bg: #050810; --bg-panel: #0a1020; --bg-input: #080c18;
    --fg: #d4d4d4; --fg-dim: #5a5a5a; --fg-bright: #ffffff; --fg-muted: #808080;
    --accent: #569cd6; --warn: #dcdcaa; --err: #f44747; --magenta: #c586c0;
    --border: rgba(86, 156, 214, 0.2); --border-bright: rgba(86, 156, 214, 0.5);
    --glow: 0 0 8px rgba(86, 156, 214, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 14px; line-height: 1.65; overflow: hidden; -webkit-font-smoothing: antialiased; }
  body { background: radial-gradient(ellipse 100% 80% at 50% 50%, color-mix(in srgb, var(--bg-panel) 80%, var(--bg)) 0%, var(--bg) 70%, #000 100%); transition: background 0.4s; }
  .crt-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 100; background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px); }
  .crt-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 99; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.6) 100%); }
  .crt-flicker { position: fixed; inset: 0; pointer-events: none; z-index: 98; background: color-mix(in srgb, var(--fg) 2%, transparent); animation: flicker 0.15s infinite; }
  @keyframes flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.97; } }
  #terminal { height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }
  .header { border-bottom: 1px solid var(--border); background: linear-gradient(180deg, var(--bg-panel), transparent); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; flex-shrink: 0; backdrop-filter: blur(4px); }
  .header-left, .header-right { display: flex; align-items: center; gap: 18px; }
  .logo { font-family: 'VT323', monospace; font-size: 26px; color: var(--fg-bright); text-shadow: var(--glow); letter-spacing: 4px; }
  .status-item { display: flex; align-items: center; gap: 6px; color: var(--fg-muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg); box-shadow: 0 0 8px var(--fg); animation: pulse 2s infinite; }
  .status-dot.busy { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 0.5s infinite; }
  .status-dot.error { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .status-dot.tool { background: var(--magenta); box-shadow: 0 0 8px var(--magenta); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-right .status-item span:last-child { color: var(--fg-bright); }
  .output { flex: 1; overflow-y: auto; padding: 18px 22px 12px; scroll-behavior: smooth; }
  .output::-webkit-scrollbar { width: 6px; } .output::-webkit-scrollbar-track { background: var(--bg-input); }
  .output::-webkit-scrollbar-thumb { background: var(--fg-dim); } .output::-webkit-scrollbar-thumb:hover { background: var(--fg); }
  .line { margin-bottom: 3px; word-wrap: break-word; white-space: pre-wrap; }
  .line.system { color: var(--fg-muted); } .line.user { color: var(--fg-bright); }
  .line.user::before { content: '▸ '; color: var(--accent); font-weight: 700; }
  .line.assistant { color: var(--fg); } .assistant-prefix { color: var(--magenta); margin-right: 4px; }
  .line.error { color: var(--err); } .line.warn { color: var(--warn); }
  .line.info { color: var(--accent); } .line.success { color: var(--fg-bright); text-shadow: var(--glow); }
  .line.prompt { color: var(--warn); font-weight: 700; }
  .glow { text-shadow: 0 0 5px currentColor; }
  
  .think-box { border: 1px dashed var(--fg-muted); background: rgba(0,0,0,0.3); padding: 8px 12px; margin: 6px 0 10px 0; border-radius: 4px; font-size: 12px; color: var(--fg-muted); position: relative; }
  .think-box::before { content: 'THINKING PROCESS'; position: absolute; top: -8px; left: 10px; background: var(--bg); padding: 0 6px; font-size: 10px; color: var(--magenta); font-weight: 700; }
  .think-content { white-space: pre-wrap; margin-top: 4px; }

  .ascii-art { color: var(--fg); text-shadow: var(--glow); font-size: 11px; line-height: 1.15; white-space: pre; margin: 10px 0; }
  .code-block { background: color-mix(in srgb, var(--fg) 5%, transparent); border: 1px solid var(--border); border-left: 3px solid var(--fg); padding: 10px 14px; margin: 8px 0; font-size: 13px; color: var(--fg-bright); white-space: pre; overflow-x: auto; position: relative; }
  .code-block::before { content: attr(data-lang); position: absolute; top: -1px; right: 8px; background: var(--bg-panel); padding: 0 6px; font-size: 10px; color: var(--fg-muted); border: 1px solid var(--border); border-top: none; }
  .code-inline { background: color-mix(in srgb, var(--fg) 12%, transparent); padding: 1px 5px; border-radius: 2px; color: var(--accent); font-size: 13px; }
  
  .media-frame { border: 1px solid var(--border-bright); padding: 6px; margin: 14px 0; display: inline-block; position: relative; background: var(--bg-panel); max-width: 100%; box-shadow: 0 0 20px color-mix(in srgb, var(--fg) 15%, transparent); }
  .media-frame::before { content: '[ ' attr(data-type) ' OUTPUT // ID: @' attr(data-id) ' ]'; position: absolute; top: -10px; left: 8px; background: var(--bg); padding: 0 6px; font-size: 10px; color: var(--fg); letter-spacing: 1px; }
  .media-frame img, .media-frame video { display: block; max-width: 100%; max-height: 460px; }
  .media-meta { font-size: 11px; color: var(--fg-muted); margin-top: 6px; padding: 6px 8px; border-top: 1px dashed var(--border); word-break: break-all; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  
  .tool-card { border: 1px solid var(--border-bright); padding: 14px; margin: 14px 0; background: var(--bg-panel); display: flex; gap: 16px; align-items: flex-start; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  .tool-card img { width: 140px; height: 140px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .tool-card .info { flex: 1; }
  .tool-card h3 { color: var(--fg-bright); margin-bottom: 6px; font-size: 16px; }
  .tool-card p { color: var(--fg-muted); font-size: 12px; margin-bottom: 8px; }

  .file-card { border: 1px solid var(--accent); padding: 12px; margin: 10px 0; background: var(--bg-panel); border-radius: 4px; }
  .file-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px dashed var(--border); padding-bottom: 4px; }
  .file-card-header span { color: var(--accent); font-weight: 700; font-size: 13px; }

  .btn { display: inline-block; background: var(--fg); color: var(--bg); padding: 6px 12px; text-decoration: none; font-weight: 700; font-size: 12px; border-radius: 2px; margin-top: 8px; margin-right: 8px; transition: transform 0.1s; cursor: pointer; border: none; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 0 10px var(--fg); }
  .btn.secondary { background: transparent; border: 1px solid var(--fg); color: var(--fg); }
  .btn.download { background: var(--accent); color: #000; }
  .btn.danger { background: var(--err); color: #fff; }

  .spinner { display: inline-block; color: var(--fg); }
  .spinner::after { content: '⠋'; animation: spin 0.8s steps(8) infinite; display: inline-block; font-size: 14px; }
  @keyframes spin { 0% { content: '⠋'; } 12.5% { content: '⠙'; } 25% { content: '⠹'; } 37.5% { content: '⠸'; } 50% { content: '⠼'; } 62.5% { content: '⠴'; } 75% { content: '⠦'; } 87.5% { content: '⠧'; } 100% { content: '⠇'; } }
  .thinking-dots::after { content: '●○○'; animation: thinkDots 1.2s infinite; color: var(--fg-dim); letter-spacing: 2px; }
  @keyframes thinkDots { 0%, 33% { content: '●○○'; color: var(--fg); } 34%, 66% { content: '○●○'; color: var(--fg); } 67%, 100% { content: '○○●'; color: var(--fg); } }
  
  .input-wrapper { border-top: 1px solid var(--border); background: var(--bg-input); flex-shrink: 0; position: relative; }
  .input-hint { font-size: 11px; color: var(--fg-muted); padding: 6px 22px 2px; display: flex; gap: 10px; flex-wrap: wrap; }
  .input-hint .cmd { color: var(--accent); }
  .input-area { padding: 10px 22px 14px; display: flex; align-items: center; gap: 10px; }
  .prompt-symbol { color: var(--accent); font-weight: 700; text-shadow: 0 0 6px var(--accent); font-size: 16px; }
  .prompt-symbol.busy { color: var(--warn); text-shadow: 0 0 6px var(--warn); }
  .prompt-symbol.prompt { color: var(--magenta); text-shadow: 0 0 6px var(--magenta); }
  .input-field { flex: 1; background: transparent; border: none; outline: none; color: var(--fg-bright); font-family: 'JetBrains Mono', monospace; font-size: 14px; caret-color: var(--fg); }
  .input-field::placeholder { color: var(--fg-dim); } .input-field:disabled { opacity: 0.5; }
  
  .autocomplete-box { display: none; position: absolute; bottom: 60px; left: 22px; right: 22px; max-height: 280px; overflow-y: auto; background: var(--bg-panel); border: 1px solid var(--border-bright); box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 50; flex-direction: column; }
  .ac-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .ac-item.active { background: color-mix(in srgb, var(--fg) 12%, transparent); }
  .ac-icon { font-size: 16px; width: 24px; text-align: center; color: var(--accent); }
  .ac-content { flex: 1; }
  .ac-title { color: var(--fg-bright); font-size: 13px; }
  .ac-desc { color: var(--fg-muted); font-size: 11px; }
  .ac-params { margin-top: 4px; font-size: 10px; color: var(--magenta); }
  .ac-thumb { width: 32px; height: 32px; object-fit: cover; border: 1px solid var(--border-bright); }

  .help-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
  .help-table td { padding: 5px 14px; border-bottom: 1px dashed var(--border); vertical-align: top; }
  .help-table td:first-child { color: var(--accent); white-space: nowrap; width: 1%; font-weight: 500; }
  .help-table td:last-child { color: var(--fg-muted); }
  .help-section { color: var(--fg-bright); font-weight: 700; margin: 12px 0 4px; padding: 2px 0; border-bottom: 1px solid var(--border); }
  a { color: var(--accent); text-decoration: underline; text-decoration-style: dotted; } a:hover { text-shadow: 0 0 5px var(--accent); }
  strong { color: var(--fg-bright); font-weight: 700; }
  ::selection { background: var(--fg); color: var(--bg); }

  .search-container { border: 1px solid var(--border-bright); padding: 14px; margin: 10px 0; background: var(--bg-panel); border-radius: 4px; }
  .search-logo { color: var(--warn); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .search-item { padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .search-item:last-child { border-bottom: none; }
  .search-item h4 { margin: 0 0 4px 0; font-size: 15px; }
  .search-item h4 a { color: var(--accent); text-decoration: none; }
  .search-item h4 a:hover { text-decoration: underline; }
  .search-item .url { color: var(--fg-muted); font-size: 11px; margin-bottom: 4px; word-break: break-all; }
  .search-item p { color: var(--fg); font-size: 12px; margin: 0; line-height: 1.4; }
</style>

function setStatus(status) {
  statusDot.className = 'status-dot'; promptSymbol.classList.remove('busy', 'prompt');
  // Allow typing even when busy, but change visual state
  if (status === 'busy') { statusDot.classList.add('busy'); statusText.textContent = 'PROCESSING'; promptSymbol.classList.add('busy'); input.disabled = false; }
  else if (status === 'error') { statusDot.classList.add('error'); statusText.textContent = 'ERROR'; input.disabled = false; }
  else if (status === 'tool') { statusDot.classList.add('tool'); statusText.textContent = 'TOOL CALL'; promptSymbol.classList.add('prompt'); input.disabled = false; }
  else if (status === 'prompt') { statusDot.classList.add('busy'); statusText.textContent = 'AWAITING INPUT'; promptSymbol.classList.add('prompt'); input.disabled = false; }
  else { statusText.textContent = codeMode ? 'CODE MODE' : 'ONLINE'; input.disabled = false; }
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function renderMarkdown(text) {
  let html = escapeHtml(text);
  // Parse File Blocks
  html = html.replace(/\[FILE:\s*(.+?)\]\n?```[\s\S]*?\n?([\s\S]*?)\n?```/g, (m, path, content) => {
    const safeContent = escapeHtml(content.trim());
    const safePath = escapeHtml(path.trim());
    return `<div class="file-card"><div class="file-card-header"><span>📄 ${safePath}</span></div><div class="code-block" data-lang="file">${safeContent}</div><button class="btn download" onclick="downloadFile('${safePath}', \`${safeContent.replace(/`/g, '\\`')}\`)">Download</button></div>`;
  });
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, l, c) => `<div class="code-block" data-lang="${l||'code'}">${c.trim()}</div>`);
  html = html.replace(/`([^`\n]+)`/g, '<span class="code-inline">$1</span>');
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^### (.+)$/gm, '<div style="color:var(--accent);font-weight:700;margin:8px 0 4px">$1</div>');
  html = html.replace(/^## (.+)$/gm, '<div style="color:var(--accent);font-weight:700;font-size:15px;margin:10px 0 4px">$1</div>');
  html = html.replace(/^# (.+)$/gm, '<div style="color:var(--accent);font-weight:700;font-size:16px;margin:10px 0 4px">$1</div>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  html = html.replace(/(^|[^"=])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank">$2</a>');
  html = html.replace(/^[-*] (.+)$/gm, '<div style="padding-left:16px;color:var(--fg)">• $1</div>');
  return html;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename.split('/').pop(); a.click();
  URL.revokeObjectURL(url);
}

// UTF-8 Base64
function b64EncodeUnicode(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) { return String.fromCharCode('0x' + p1); }));
}
function b64DecodeUnicode(str) {
  return decodeURIComponent(Array.prototype.map.call(atob(str), function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
}

function checkAutocomplete() {
  const val = input.value; const cp = input.selectionStart; const t = val.substring(0, cp);
  const atMatch = t.match(/(?:^|\s)@([^\s]*)$/);
  if (atMatch) {
    acState.type = 'asset'; acState.items = assets.filter(a => a.id.toString().startsWith(atMatch[1]));
    if (acState.items.length > 0) { acState.activeIndex = 0; renderAssetList(); return; }
  }
  const parts = val.split(' ');
  if (parts[0].startsWith('/') && parts.length === 1) {
    acState.type = 'command'; acState.items = COMMANDS_LIST.filter(c => c.cmd.startsWith('/' + parts[0].slice(1)));
    if (acState.items.length > 0) { acState.activeIndex = 0; renderCommandList(); return; }
  } else if (parts[0].startsWith('/') && parts.length > 1) {
    const cmdObj = COMMANDS_LIST.find(c => c.cmd === parts[0]);
    if (cmdObj && cmdObj.args) {
      const argIdx = parts.length - 2; const currentArg = cmdObj.args[argIdx]; const currentText = parts[parts.length - 1];
      if (currentArg && currentArg.options) {
        acState.type = 'options'; acState.items = currentArg.options.filter(o => o.startsWith(currentText));
        acState.cmdObj = cmdObj; acState.argIdx = argIdx;
        if (acState.items.length > 0) { acState.activeIndex = 0; renderParamHint(); return; }
      } else { acState.type = 'param'; acState.cmdObj = cmdObj; acState.argIdx = argIdx; renderParamHint(); return; }
    }
  }
  hideAutocomplete();
}
function renderCommandList() {
  acBox.innerHTML = '';
  acState.items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'ac-item' + (idx === acState.activeIndex ? ' active' : '');
    let paramsHtml = item.args ? `<div class="ac-params">Args: ${item.args.map(a=>`<${a.name}>`).join(' ')}</div>` : '';
    div.innerHTML = `<div class="ac-icon">▸</div><div class="ac-content"><div class="ac-title">${item.cmd}</div><div class="ac-desc">${item.desc || ''}</div>${paramsHtml}</div>`;
    div.addEventListener('click', () => applyCommandAutocomplete(idx));
    acBox.appendChild(div);
  });
  acBox.style.display = 'flex';
}
function renderAssetList() {
  acBox.innerHTML = '';
  acState.items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'ac-item' + (idx === acState.activeIndex ? ' active' : '');
    const t = item.type === 'image' ? `<img src="${item.url}" class="ac-thumb">` : `<div class="ac-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--magenta);font-size:10px;">VID</div>`;
    div.innerHTML = `${t}<div class="ac-content"><div class="ac-title">@${item.id} [${item.type.toUpperCase()}]</div><div class="ac-desc">${escapeHtml(item.prompt.substring(0, 60))}</div></div>`;
    div.addEventListener('click', () => applyAssetAutocomplete(idx));
    acBox.appendChild(div);
  });
  acBox.style.display = 'flex';
}
function renderParamHint() {
  acBox.innerHTML = ''; const cmdObj = acState.cmdObj; const argIdx = acState.argIdx;
  const header = document.createElement('div');
  header.className = 'ac-item'; header.style.cursor = 'default'; header.style.background = 'var(--bg-input)';
  let paramsHtml = cmdObj.args.map((a, i) => `<span style="color:${i===argIdx?'var(--warn)':'var(--fg-dim)'};font-weight:${i===argIdx?'700':'400'}">${i===argIdx?'▶ ':'  '}${a.name}</span>`).join('<br>');
  header.innerHTML = `<div class="ac-icon">▸</div><div class="ac-content"><div class="ac-title">${cmdObj.cmd}</div><div class="ac-desc">${cmdObj.desc}</div><div class="ac-params" style="margin-top:6px; border-top:1px dashed var(--border); padding-top:4px;">${paramsHtml}</div></div>`;
  acBox.appendChild(header);
  if (acState.type === 'options') {
    acState.items.forEach((opt, idx) => {
      const div = document.createElement('div');
      div.className = 'ac-item' + (idx === acState.activeIndex ? ' active' : '');
      div.innerHTML = `<div class="ac-icon">•</div><div class="ac-content"><div class="ac-title">${opt}</div></div>`;
      div.addEventListener('click', () => applyOptionAutocomplete(idx));
      acBox.appendChild(div);
    });
  }
  acBox.style.display = 'flex';
}
function applyCommandAutocomplete(idx) { idx = idx===undefined?acState.activeIndex:idx; const item = acState.items[idx]; if(!item) return; input.value = item.cmd + ' '; input.focus(); input.setSelectionRange(input.value.length, input.value.length); checkAutocomplete(); }
function applyAssetAutocomplete(idx) { idx = idx===undefined?acState.activeIndex:idx; const item = acState.items[idx]; if(!item) return; const val = input.value; const cp = input.selectionStart; const t = val.substring(0, cp); const ins = '@' + item.id + ' '; const m = t.match(/(?:^|\s)@([^\s]*)$/); const ws = m.index + (m[0].length - m[1].length); input.value = val.substring(0, ws) + ins + val.substring(cp); input.focus(); input.setSelectionRange(ws + ins.length, ws + ins.length); hideAutocomplete(); }
function applyOptionAutocomplete(idx) { idx = idx===undefined?acState.activeIndex:idx; const opt = acState.items[idx]; if(!opt) return; const parts = input.value.split(' '); parts[parts.length - 1] = opt + ' '; input.value = parts.join(' '); input.focus(); input.setSelectionRange(input.value.length, input.value.length); hideAutocomplete(); }
function hideAutocomplete() { acBox.style.display = 'none'; acState.type = null; acState.items = []; }

function waitForInput() { return new Promise(resolve => { setStatus('prompt'); interactiveCallback = (val) => { setStatus('online'); resolve(val); }; input.focus(); }); }
async function runForm(title, fields) {
  appendLine(`═══ ${title} ═══`, 'info'); let responses = {};
  for (let field of fields) {
    let valid = false;
    while (!valid) {
      appendLine(field.question, 'prompt');
      if (field.options) field.options.forEach((o, i) => appendLine(`  ${i + 1}. ${o}`, 'system'));
      let ans = await waitForInput(); appendLine(ans, 'user');
      if (field.options) {
        let idx = parseInt(ans) - 1;
        if (idx >= 0 && idx < field.options.length) { responses[field.name] = field.options[idx]; valid = true; }
        else if (field.values && field.values.includes(ans)) { responses[field.name] = ans; valid = true; }
        else appendLine('[ERROR] Invalid choice.', 'error');
      } else if (field.validator) {
        let res = field.validator(ans);
        if (res.valid) { responses[field.name] = res.value; valid = true; } else appendLine(`[ERROR] ${res.error}`, 'error');
      } else { if (!ans && field.required !== false) appendLine('[ERROR] Required.', 'error'); else { responses[field.name] = ans; valid = true; } }
    }
  }
  return responses;
}

function addAsset(type, url, prompt) { const id = assets.length + 1; assets.push({ id, type, url, prompt }); appendLine(`[SYSTEM] Saved as asset @${id}`, 'success'); return id; }
function resolveReferences(text) {
  const idM = [...text.matchAll(/@(\d+)/g)]; const urlM = [...text.matchAll(/(https?:\/\/[^\s]+)/g)];
  const urls = [], refs = []; let cT = text;
  idM.forEach(m => { const id = parseInt(m[1]); const a = assets.find(x => x.id === id); if (a) { urls.push(a.url); refs.push(a); cT = cT.replace(m[0], `[Ref @${id}]`); } });
  urlM.forEach(m => { if (!urls.includes(m[0])) { urls.push(m[0]); refs.push({ type: 'url', url: m[0], id: 'URL' }); cT = cT.replace(m[0], `[Ref URL]`); } });
  return { urls, text: cT, refs };
}
async function executeToolCall(name, args) {
  appendLine(`[TOOL] Executing: ${name}(${JSON.stringify(args)})`, 'info');
  try {
    if (name === 'get_current_datetime') return new Date().toString();
    if (name === 'web_search') {
      const r = await fetch(`${CORS_PROXY}${encodeURIComponent(`https://api.duckduckgo.com/?q=${encodeURIComponent(args.query)}&format=json&no_html=1&skip_disambig=1`)}`);
      const d = await r.json();
      let res = d.AbstractText ? d.AbstractText + "\nSource: " + d.AbstractURL : "No instant answer. ";
      if (d.RelatedTopics && d.RelatedTopics.length > 0) {
        res += "\nRelated:\n" + d.RelatedTopics.slice(0,5).map(t => `- ${t.Text} (${t.FirstURL})`).join('\n');
      }
      return res;
    }
    if (name === 'read_url') return await (await fetch(`https://r.jina.ai/${args.url}`)).text();
    if (name === 'shorten_url') { const r = await (await fetch(`${CORS_PROXY}${encodeURIComponent(`https://is.gd/create.php?format=json&url=${encodeURIComponent(args.url)}`)}`)).json(); return r.shorturl || 'Failed'; }
    if (name === 'create_temp_email') { const r = await (await fetch(`${CORS_PROXY}${encodeURIComponent('https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1')}`)).json(); return r[0] || 'Failed'; }
    if (name === 'publish_to_brewpage') {
      const r = await fetch(`${CORS_PROXY}${encodeURIComponent('https://brewpage.app/api/html?format=' + args.format)}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: args.content }) });
      const d = await r.json();
      if (d.link) { appendHTML(`<div class="tool-card"><div class="info"><h3>Content Hosted</h3><p>URL: <a href="${d.link}" target="_blank">${d.link}</a></p></div></div>`); return `Published successfully! URL: ${d.link}`; }
      return 'Failed to publish';
    }
    if (name === 'generate_visual_aid') {
      const r = await fetch(`${API_BASE}/v1/images/generations`, { method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ model: 'agnes-image-2.0-flash', prompt: args.prompt, size: '1024x1024', extra_body: { response_format: 'url' } }) });
      const d = await r.json(); const url = d.data?.[0]?.url;
      if (url) { const id = addAsset('image', url, args.prompt); appendHTML(`<div class="media-frame" data-type="AI_IMAGE" data-id="${id}"><img src="${url}"><div class="media-meta"><span>AI Visual Aid</span><a href="${url}" download class="btn secondary">Download</a></div></div>`); return `Image generated and displayed as @${id}. URL: ${url}`; }
      return 'Failed to generate image';
    }
    if (name === 'search_nasa_images') {
      const r = await fetch(`https://images-api.nasa.gov/search?q=${encodeURIComponent(args.query)}&media_type=image`); const d = await r.json();
      const items = d.collection?.items || [];
      let imgItem = items.find(i => i.links && i.links[0].href && i.data[0].media_type === 'image');
      if (imgItem) {
        const url = imgItem.links[0].href; const id = addAsset('image', url, 'NASA: ' + args.query);
        appendHTML(`<div class="media-frame" data-type="NASA_IMG" data-id="${id}"><img src="${url}"><div class="media-meta"><span>NASA Image: ${args.query}</span><a href="${url}" download class="btn secondary">Download</a></div></div>`);
        return `Found and displayed NASA image for "${args.query}" as @${id}. URL: ${url}`;
      }
      return `No images found for "${args.query}"`;
    }
  } catch (e) { return `Tool failed: ${e.message}`; }
  return "Tool not found";
}

async function processQueue() {
  if (isProcessing || messageQueue.length === 0) return;
  isProcessing = true;
  const { msg, vision, think } = messageQueue.shift();
  await chat(msg, vision, think);
  isProcessing = false;
  processQueue();
}

async function chat(userMessage, visionContent = null, enableThinking = false) {
  conversationHistory = conversationHistory.filter(m => m.role !== 'system');
  conversationHistory.unshift({ role: 'system', content: systemPrompt });
  
  let finalMessage = userMessage;
  if (uploadedFileContent) {
    finalMessage = `The user uploaded a file. File content:\n\`\`\`\n${uploadedFileContent}\n\`\`\`\n\nUser query: ${userMessage}`;
    uploadedFileContent = null;
  }

  if (visionContent) conversationHistory.push({ role: 'user', content: visionContent });
  else conversationHistory.push({ role: 'user', content: finalMessage });
  ctxCount.textContent = conversationHistory.filter(m => m.role !== 'system').length;
  
  const aDiv = document.createElement('div'); aDiv.className = 'line assistant';
  const pfx = document.createElement('span'); pfx.className = 'assistant-prefix'; pfx.textContent = codeMode ? 'code▸' : 'as▸'; aDiv.appendChild(pfx);
  const cSpan = document.createElement('span'); aDiv.appendChild(cSpan);
  const cur = document.createElement('span'); cur.className = 'tw-cursor'; aDiv.appendChild(cur);
  output.appendChild(aDiv); output.scrollTop = output.scrollHeight;
  cSpan.innerHTML = '<span class="thinking-dots"></span>'; setStatus('busy');

  try {
    let payload = { model: currentModel, messages: conversationHistory, stream: false, temperature };
    if (enableThinking) payload.chat_template_kwargs = { enable_thinking: true };
    if (!visionContent) payload.tools = AVAILABLE_TOOLS;

    let res = await fetch(`${API_BASE}/v1/chat/completions`, { method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    let data = await res.json(); let msg = data.choices[0].message;

    if (msg.tool_calls && msg.tool_calls.length > 0) {
      cur.remove(); cSpan.innerHTML = '<span style="color:var(--magenta)">[Initiating Tool Call...]</span>'; setStatus('tool');
      conversationHistory.push(msg);
      for (let tc of msg.tool_calls) {
        const args = JSON.parse(tc.function.arguments);
        const result = await executeToolCall(tc.function.name, args);
        appendLine(`[TOOL] Result received.`, 'success');
        conversationHistory.push({ role: "tool", tool_call_id: tc.id, name: tc.function.name, content: result });
      }
      cSpan.innerHTML = ''; aDiv.appendChild(cur); setStatus('busy');
      payload = { model: currentModel, messages: conversationHistory, stream: true, temperature };
      if (enableThinking) payload.chat_template_kwargs = { enable_thinking: true };
      res = await fetch(`${API_BASE}/v1/chat/completions`, { method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    } else {
      const txt = msg.content || ""; msg.content = "";
      const fakeStream = async () => { const ch = txt.match(/.{1,5}/g) || []; const enc = new TextEncoder(); const s = new ReadableStream({ start(c) { ch.forEach(x => c.enqueue(enc.encode(`data: ${JSON.stringify({choices:[{delta:{content:x}}]})}\n\n`))); c.enqueue(enc.encode('data: [DONE]\n\n')); c.close(); } }); return new Response(s); };
      res = await fakeStream();
    }

    const reader = res.body.getReader(); const decoder = new TextDecoder();
    let buffer = '', fullResp = '', firstTok = true, tBox = null, tCont = null;
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n'); buffer = lines.pop() || '';
      for (let line of lines) {
        const t = line.trim(); if (!t || !t.startsWith('data:')) continue; const d = t.slice(5).trim(); if (d === '[DONE]') continue;
        try {
          const p = JSON.parse(d); const delta = p.choices?.[0]?.delta?.content || '';
          if (delta) {
            if (firstTok) { cSpan.innerHTML = ''; firstTok = false; }
            fullResp += delta;
            if (fullResp.includes("<think") && !fullResp.includes("</think")) {
              if (!tBox) { tBox = document.createElement('div'); tBox.className = 'think-box'; tCont = document.createElement('div'); tCont.className = 'think-content'; tBox.appendChild(tCont); cSpan.appendChild(tBox); }
              tCont.textContent = fullResp.split("<think")[1].replace(/^[^>]*>/, '');
            } else if (fullResp.includes("</think")) {
              const parts = fullResp.split("</think");
              if (tCont && parts[0]) tCont.textContent = parts[0].split("<think")[1].replace(/^[^>]*>/, '');
              let main = cSpan.querySelector('.main-output'); if (!main) { main = document.createElement('div'); main.className = 'main-output'; cSpan.appendChild(main); }
              main.innerHTML = renderMarkdown(parts[1] || "");
            } else {
              let main = cSpan.querySelector('.main-output'); if (!main) { main = document.createElement('div'); main.className = 'main-output'; cSpan.appendChild(main); }
              main.innerHTML = renderMarkdown(fullResp);
            }
            output.scrollTop = output.scrollHeight;
          }
        } catch (e) {}
      }
    }
    cur.remove(); if (!fullResp) cSpan.innerHTML = '<span style="color:var(--warn)">(empty response)</span>';
    const clean = fullResp.replace(/<think[\s\S]*?<\/think>/g, '').trim();
    conversationHistory.push({ role: 'assistant', content: clean });
    ctxCount.textContent = conversationHistory.filter(m => m.role !== 'system').length; setStatus('online');
  } catch (e) { cur.remove(); cSpan.innerHTML = `<span style="color:var(--err)">[ERROR] ${escapeHtml(e.message)}</span>`; setStatus('error'); setTimeout(() => setStatus('online'), 3000); conversationHistory.pop(); ctxCount.textContent = conversationHistory.filter(m => m.role !== 'system').length; }
}

  const { urls, text, refs } = resolveReferences(initialPrompt);

  if (!prompt) { const res = await runForm('IMAGE GENERATOR', [{ name: 'prompt', question: 'Enter image prompt:' }]); prompt = res.prompt; }

  appendLine(`[IMAGE] Gen init... Model: ${model}, Size: ${sizeRes.size}`, 'info');
  const spin = appendHTML('<span class="spinner"></span> Rendering...'); setStatus('busy');
  try {
    const body = { model, prompt, size: sizeRes.size, extra_body: { response_format: 'url' } };
    if (urls.length > 0) body.extra_body.image = urls;
    const res = await fetch(`${API_BASE}/v1/images/generations`, { method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });

    else throw new Error('No URL');
  } catch (e) { spin.remove(); appendLine(`[ERROR] ${e.message}`, 'error'); setStatus('error'); setTimeout(() => setStatus('online'), 3000); }
  setStatus('online');
}
async function generateVideoFlow(initialPrompt) {
  const { urls, text, refs } = resolveReferences(initialPrompt);
  let prompt = text;
  if (!prompt) { const res = await runForm('VIDEO GENERATOR', [{ name: 'prompt', question: 'Enter video prompt:' }]); prompt = res.prompt; }
  const resForm = await runForm('VIDEO RESOLUTION', [{ name: 'res', question: 'Select resolution:', options: ['1152x768 (16:9)', '768x1152 (9:16)', '768x768 (1:1)'] }]);
  let w = 1152, h = 768; if (resForm.res.includes('768x1152')) { w = 768; h = 1152; } else if (resForm.res.includes('768x768')) { w = 768; h = 768; }
  const durForm = await runForm('VIDEO DURATION', [{ name: 'dur', question: 'Select duration:', options: ['~3s (81 frames)', '~5s (121 frames)', '~10s (241 frames)'] }]);
  let frames = 121; if (durForm.dur.includes('81')) frames = 81; else if (durForm.dur.includes('241')) frames = 241;
  appendLine(`[VIDEO] Gen init... Size: ${w}x${h}, Frames: ${frames}`, 'info'); const spin = appendHTML('<span class="spinner"></span> Creating task...'); setStatus('busy');
  try {

async function githubPush(args) {
  const parts = args.split(' ');
  if (parts.length < 3) { appendLine('[ERROR] Usage: /gh-push <owner/repo> <path> <token>', 'error'); return; }
  const repo = parts[0]; const path = parts[1]; const token = parts[2];
  appendLine(`[GITHUB] Preparing to push to ${repo}/${path}...`, 'info');
  
  if (!uploadedFileContent) { appendLine('[ERROR] No file content loaded. Use /upload first.', 'error'); return; }
  const content = uploadedFileContent;
  uploadedFileContent = null;

  const spin = appendHTML('<span class="spinner"></span> Pushing to GitHub...');
  try {
    // Check if file exists to get SHA
    let sha = null;
    const checkRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { 'Authorization': `Bearer ${token}` } });
    if (checkRes.ok) { const checkData = await checkRes.json(); sha = checkData.sha; appendLine('[GITHUB] File exists. Updating...', 'system'); }

    const body = { message: `Update ${path} via As OS`, content: b64EncodeUnicode(content) };
    if (sha) body.sha = sha;

    const pushRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const pushData = await pushRes.json();
    spin.remove();
    if (pushRes.ok) { appendHTML(`<div class="tool-card"><div class="info"><h3>Push Successful!</h3><p>File: ${path}</p><p>Commit: ${pushData.commit.sha.substring(0,7)}</p><a href="${pushData.content.html_url}" target="_blank" class="btn">View on GitHub</a></div></div>`); appendLine('[GITHUB] Push complete.', 'success'); }
    else throw new Error(pushData.message || 'Push failed');
  } catch (e) { spin.remove(); appendLine(`[ERROR] ${e.message}`, 'error'); }
}

async function githubPull(args) {
  const parts = args.split(' ');
  if (parts.length < 3) { appendLine('[ERROR] Usage: /gh-pull <owner/repo> <path> <token>', 'error'); return; }
  const repo = parts[0]; const path = parts[1]; const token = parts[2];
  appendLine(`[GITHUB] Pulling ${repo}/${path}...`, 'info');

    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { 'Authorization': `Bearer ${token}` } });

}

    <tr><td>/movie &lt;title&gt;</td><td>Movie database (TMDB)</td></tr>
    <tr><td>/anime &lt;title&gt;</td><td>Anime database (MAL)</td></tr>
    <tr><td>/nasa &lt;query&gt;</td><td>Search NASA images</td></tr>
    <tr><td>/github &lt;user&gt;</td><td>GitHub contributions chart</td></tr>
  </table>
  <div class="help-section">▸ UTILITY & SYSTEM</div><table class="help-table">
    <tr><td>/search &lt;query&gt;</td><td>Web search (DuckDuckGo)</td></tr>
    <tr><td>/read &lt;url&gt;</td><td>Read URL content (Jina)</td></tr>
    <tr><td>/mbti test</td><td>MBTI personality test</td></tr>
    <tr><td>/temp &lt;0-2&gt;</td><td>Set temperature</td></tr>
    <tr><td>/theme &lt;name&gt;</td><td>green, amber, cyan, matrix</td></tr>
    <tr><td>/clear</td><td>Clear terminal</td></tr>
    <tr><td>/reboot</td><td>Reboot system</td></tr>
  </table>`);
}

// ═══════════════════════════════════════════════════════════
// PROCESS INPUT
// ═══════════════════════════════════════════════════════════
async function processInput(text) {
  const tr = text.trim(); if (!tr) return; commandHistory.push(tr); historyIndex = commandHistory.length; appendLine(tr, 'user');
  if (tr.startsWith('/')) {
    const si = tr.indexOf(' '); const c = (si===-1?tr.slice(1):tr.slice(1,si)).toLowerCase(); const a = si===-1?'':tr.slice(si+1).trim();
    switch (c) {
      case 'help': case 'h': case '?': showHelp(); break;
      case 'code':
        codeMode = true; document.body.classList.add('cli-mode'); logoText.textContent = 'As CLI';
        promptSymbol.textContent = 'code▸'; promptSymbol.style.color = 'var(--magenta)';
        systemPrompt += '\nYou are now in Code Mode. Focus on software development. If the user asks to host code or a web page, use `publish_to_brewpage`. If you generate code, format it as [FILE: path/to/file]```code ``` so the UI can render it as a file card.';
        appendLine('[CODE] Entered Code Mode. AI is now a pair programmer. Type /exit to leave.', 'info');
        setStatus('online'); break;
      case 'exit':
        if (codeMode) {
          codeMode = false; document.body.classList.remove('cli-mode'); logoText.textContent = 'As OS';
          promptSymbol.textContent = '▸'; promptSymbol.style.color = 'var(--accent)';
          appendLine('[CODE] Exited Code Mode. Memory retained.', 'info');
          systemPrompt = baseSystemPrompt; setStatus('online');
        } else { appendLine('[SYSTEM] Goodbye.', 'warn'); }
        break;
      case 'gh-push': await githubPush(a); break;
      case 'gh-pull': await githubPull(a); break;
      case 'image': case 'img': await generateImageFlow(a, 'agnes-image-2.0-flash'); break;
      case 'image2': case 'img2': await generateImageFlow(a, 'agnes-image-2.1-flash'); break;
      case 'video': case 'vid': await generateVideoFlow(a); break;
      case 'look': case 'vision': case 'see': {
        if(!a) { appendLine('[ERROR] Usage: /look <@id|url> <question>', 'error'); break; }
        const refMatch = a.match(/^(@\d+|https?:\/\/[^\s]+)\s*(.*)/);
        if (refMatch) {
          const ref = refMatch[1]; const question = refMatch[2] || 'Describe this image.';
          const { urls } = resolveReferences(ref);
          if (urls.length > 0) messageQueue.push({ msg: question, vision: [{type:'text', text:question}, ...urls.map(u=>({type:'image_url', image_url:{url:u}}))] });
        } else { appendLine('[ERROR] Usage: /look <@id|url> <question>', 'error'); }
        break;
      }
      case 'think': if(a) messageQueue.push({ msg: a, think: true }); else appendLine('[ERROR] Usage: /think <msg>', 'error'); break;
      case 'brew': await brewCommand(a); break;
      case 'upload': await uploadFile(); break;
      case 'github': case 'gh': await githubCommand(a); break;
      case 'nasa': await nasaCommand(a); break;
      case 'anime': await animeCommand(a); break;
      case 'mbti': await mbtiCommand(a); break;
      case 'yt': await ytCommand(a); break;
      case 'movie': await movieCommand(a); break;
      case 'search': await searchCommand(a); break;
      case 'read': await readCommand(a); break;
      case 'shorten': await shortenCommand(a); break;
      case 'mail': await mailCommand(a); break;
      case 'weather': messageQueue.push({ msg: `What is the weather like in ${a}?` }); break;
      case 'ask': { if(!a) break; const sv=[...conversationHistory]; conversationHistory=[]; messageQueue.push({ msg: a }); break; }
      case 'joke': messageQueue.push({ msg: "Tell me a short programming joke." }); break;
      case 'gallery': case 'assets': if(assets.length===0){appendLine('[GALLERY] No assets.','system');break;} appendLine('═══ ASSETS ═══','info'); assets.forEach(a=>appendHTML(`<div class="tool-card">${a.type==='image'?`<img src="${a.url}">`:`<video src="${a.url}"></video>`}<div class="info"><div class="id">@${a.id} [${a.type.toUpperCase()}]</div><p>${escapeHtml(a.prompt.substring(0,100))}</p></div></div>`)); break;
      case 'temp': case 'temperature': if(!a) appendLine(`[CONFIG] Temp: ${temperature.toFixed(1)}`, 'info'); else { const t=parseFloat(a); if(!isNaN(t)&&t>=0&&t<=2){temperature=t;tempText.textContent=t.toFixed(1);appendLine(`[CONFIG] Temp set to ${t}.`, 'success');} else appendLine('[ERROR] 0-2 only.', 'error'); } break;
      case 'theme': if(!a) appendLine(`[CONFIG] Theme: ${currentTheme}`, 'info'); else { const th=['green','amber','cyan','matrix']; if(th.includes(a.toLowerCase())){document.body.className=`theme-${a.toLowerCase()}${codeMode?' cli-mode':''}`;currentTheme=a.toLowerCase();appendLine(`[CONFIG] Theme: ${a}`, 'success');} else appendLine('[ERROR] Invalid theme.', 'error'); } break;
      case 'clear': case 'cls': output.innerHTML=''; appendLine('[SYSTEM] Cleared.', 'system'); break;
      case 'reset': conversationHistory=[]; ctxCount.textContent='0'; appendLine('[SYSTEM] History reset.', 'success'); break;
      case 'neofetch': const up=Math.floor((Date.now()-window.performance.timeOrigin)/1000); appendHTML(`<div style="display:flex;gap:20px;"><pre class="ascii-art" style="font-size:10px;">       █████╗  ██████╗\n      ██╔══██╗██╔════╝\n      ███████║██║  ███╗\n      ██╔══██║██║   ██║\n      ██║  ██║╚██████╔╝\n      ╚═╝  ╚═╝ ╚═════╝</pre><div><div>user@as-os</div><div>─────────</div><div>OS: As OS v9.0</div><div>Uptime: ${Math.floor(up/60)}m</div><div>Assets: ${assets.length}</div></div></div>`); break;
      case 'reboot': output.innerHTML=''; conversationHistory=[]; assets=[]; ctxCount.textContent='0'; codeMode=false; document.body.classList.remove('cli-mode'); logoText.textContent='As OS'; promptSymbol.textContent='▸'; systemPrompt=baseSystemPrompt; await bootSequence(); break;
      case 'cancel': if(interactiveCallback){interactiveCallback=null;setStatus('online');appendLine('[SYSTEM] Cancelled.','warn');} else appendLine('[SYSTEM] Nothing to cancel.', 'system'); break;
      default: appendLine(`[ERROR] Unknown cmd: /${c}`, 'error');
    }
  } else { messageQueue.push({ msg: tr }); }
  processQueue();
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
input.addEventListener('input', () => { if(!interactiveCallback) checkAutocomplete(); });
input.addEventListener('keydown', async (e) => {
  if (acBox.style.display === 'flex' && acState.items.length > 0) {
    if (e.key === 'ArrowDown') { e.preventDefault(); acState.activeIndex = (acState.activeIndex + 1) % acState.items.length; if(acState.type==='command') renderCommandList(); else if(acState.type==='asset') renderAssetList(); else if(acState.type==='options') renderParamHint(); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); acState.activeIndex = (acState.activeIndex - 1 + acState.items.length) % acState.items.length; if(acState.type==='command') renderCommandList(); else if(acState.type==='asset') renderAssetList(); else if(acState.type==='options') renderParamHint(); return; }
    if (e.key === 'Enter' || e.key === 'Tab') {
      if (acState.type === 'param') { hideAutocomplete(); } 
      else {
        e.preventDefault();
        if (acState.type === 'command') applyCommandAutocomplete();
        else if (acState.type === 'asset') applyAssetAutocomplete();
        else if (acState.type === 'options') applyOptionAutocomplete();
        return;
      }
    }
    if (e.key === 'Escape') { e.preventDefault(); hideAutocomplete(); return; }
  }

  if (e.key === 'Enter') {
    e.preventDefault(); if(!bootDone) return; const v = input.value; input.value=''; hideAutocomplete();
    if (interactiveCallback) { appendLine(v, 'user'); const cb = interactiveCallback; interactiveCallback = null; cb(v); } 
    else { processInput(v); }
    input.focus();
  } else if (e.key === 'ArrowUp') { e.preventDefault(); if(interactiveCallback) return; if(historyIndex>0){historyIndex--; input.value=commandHistory[historyIndex]||'';} } else if (e.key === 'ArrowDown') { e.preventDefault(); if(interactiveCallback) return; if(historyIndex<commandHistory.length-1){historyIndex++; input.value=commandHistory[historyIndex]||'';} else {historyIndex=commandHistory.length; input.value='';} }
  else if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); output.innerHTML=''; }
  else if (e.key === 'c' && e.ctrlKey) { if(interactiveCallback){e.preventDefault(); interactiveCallback=null; setStatus('online'); appendLine('^C','error'); appendLine('[SYSTEM] Cancelled.','warn');} }
});
document.addEventListener('click', (e) => { if(!e.target.closest('a') && !e.target.closest('video') && !e.target.closest('button') && !e.target.closest('.ac-item') && !e.target.closest('input')) input.focus(); });

bootSequence();
</script>
