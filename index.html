<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As OS // Terminal Interface v4.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030806; --bg-panel: #060f0a; --bg-input: #040a07;
    --fg: #00ff88; --fg-dim: #2d7a4f; --fg-bright: #aeffd6; --fg-muted: #4a8a5c;
    --accent: #00d4ff; --warn: #ffcc00; --err: #ff3366; --magenta: #ff44aa;
    --border: rgba(0, 255, 136, 0.15); --border-bright: rgba(0, 255, 136, 0.4);
    --glow: 0 0 8px rgba(0, 255, 136, 0.5);
  }
  body.theme-amber { --bg: #0a0600; --bg-panel: #120800; --bg-input: #0a0500; --fg: #ffb000; --fg-dim: #7a5a00; --fg-bright: #ffd980; --fg-muted: #8a6a20; --accent: #ff8800; --warn: #ffe060; --err: #ff4444; --magenta: #ff66dd; --border: rgba(255, 176, 0, 0.15); --border-bright: rgba(255, 176, 0, 0.4); --glow: 0 0 8px rgba(255, 176, 0, 0.5); }
  body.theme-cyan { --bg: #030608; --bg-panel: #060f14; --bg-input: #040a0e; --fg: #00d4ff; --fg-dim: #1a6680; --fg-bright: #80e8ff; --fg-muted: #3a7a90; --accent: #00ffcc; --warn: #ffcc00; --err: #ff3366; --magenta: #ff44aa; --border: rgba(0, 212, 255, 0.15); --border-bright: rgba(0, 212, 255, 0.4); --glow: 0 0 8px rgba(0, 212, 255, 0.5); }
  body.theme-matrix { --bg: #000300; --bg-panel: #001500; --bg-input: #000a00; --fg: #00ff41; --fg-dim: #1a7a2a; --fg-bright: #80ff80; --fg-muted: #3a8a4a; --accent: #00cc33; --warn: #ffcc00; --err: #ff3333; --magenta: #ff44aa; --border: rgba(0, 255, 65, 0.15); --border-bright: rgba(0, 255, 65, 0.4); --glow: 0 0 8px rgba(0, 255, 65, 0.5); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 14px; line-height: 1.65; overflow: hidden; -webkit-font-smoothing: antialiased; }
  body { background: radial-gradient(ellipse 100% 80% at 50% 50%, color-mix(in srgb, var(--bg-panel) 80%, var(--bg)) 0%, var(--bg) 70%, #000 100%); transition: background 0.4s; }
  .crt-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 100; background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px); }
  .crt-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 99; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.6) 100%); }
  .crt-flicker { position: fixed; inset: 0; pointer-events: none; z-index: 98; background: color-mix(in srgb, var(--fg) 2%, transparent); animation: flicker 0.15s infinite; }
  @keyframes flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.97; } }
  #terminal { height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }
  .header { border-bottom: 1px solid var(--border); background: linear-gradient(180deg, var(--bg-panel), transparent); padding: 10px 18px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; flex-shrink: 0; backdrop-filter: blur(4px); }
  .header-left, .header-right { display: flex; align-items: center; gap: 18px; }
  .logo { font-family: 'VT323', monospace; font-size: 26px; color: var(--fg-bright); text-shadow: var(--glow); letter-spacing: 4px; }
  .status-item { display: flex; align-items: center; gap: 6px; color: var(--fg-muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg); box-shadow: 0 0 8px var(--fg); animation: pulse 2s infinite; }
  .status-dot.busy { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 0.5s infinite; }
  .status-dot.error { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .status-dot.tool { background: var(--magenta); box-shadow: 0 0 8px var(--magenta); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-right .status-item span:last-child { color: var(--fg-bright); }
  .output { flex: 1; overflow-y: auto; padding: 18px 22px 12px; scroll-behavior: smooth; }
  .output::-webkit-scrollbar { width: 6px; } .output::-webkit-scrollbar-track { background: var(--bg-input); }
  .output::-webkit-scrollbar-thumb { background: var(--fg-dim); } .output::-webkit-scrollbar-thumb:hover { background: var(--fg); }
  .line { margin-bottom: 3px; word-wrap: break-word; white-space: pre-wrap; }
  .line.system { color: var(--fg-muted); } .line.user { color: var(--fg-bright); }
  .line.user::before { content: '▸ '; color: var(--accent); font-weight: 700; }
  .line.assistant { color: var(--fg); } .assistant-prefix { color: var(--magenta); margin-right: 4px; }
  .line.error { color: var(--err); } .line.warn { color: var(--warn); }
  .line.info { color: var(--accent); } .line.success { color: var(--fg-bright); text-shadow: var(--glow); }
  .line.prompt { color: var(--warn); font-weight: 700; }
  .glow { text-shadow: 0 0 5px currentColor; }
  
  /* Think Box */
  .think-box {
    border: 1px dashed var(--fg-muted); background: rgba(0,0,0,0.3);
    padding: 8px 12px; margin: 6px 0 10px 0; border-radius: 4px;
    font-size: 12px; color: var(--fg-muted); position: relative;
  }
  .think-box::before {
    content: 'THINKING PROCESS'; position: absolute; top: -8px; left: 10px;
    background: var(--bg); padding: 0 6px; font-size: 10px; color: var(--magenta); font-weight: 700;
  }
  .think-content { white-space: pre-wrap; margin-top: 4px; }

  .ascii-art { color: var(--fg); text-shadow: var(--glow); font-size: 11px; line-height: 1.15; white-space: pre; margin: 10px 0; }
  .code-block { background: color-mix(in srgb, var(--fg) 5%, transparent); border: 1px solid var(--border); border-left: 3px solid var(--fg); padding: 10px 14px; margin: 8px 0; font-size: 13px; color: var(--fg-bright); white-space: pre; overflow-x: auto; position: relative; }
  .code-block::before { content: attr(data-lang); position: absolute; top: -1px; right: 8px; background: var(--bg-panel); padding: 0 6px; font-size: 10px; color: var(--fg-muted); border: 1px solid var(--border); border-top: none; }
  .code-inline { background: color-mix(in srgb, var(--fg) 12%, transparent); padding: 1px 5px; border-radius: 2px; color: var(--accent); font-size: 13px; }
  
  /* Media & Tool Cards */
  .media-frame { border: 1px solid var(--border-bright); padding: 6px; margin: 14px 0; display: inline-block; position: relative; background: var(--bg-panel); max-width: 100%; box-shadow: 0 0 20px color-mix(in srgb, var(--fg) 15%, transparent); }
  .media-frame::before { content: '[ ' attr(data-type) ' OUTPUT // ID: @' attr(data-id) ' ]'; position: absolute; top: -10px; left: 8px; background: var(--bg); padding: 0 6px; font-size: 10px; color: var(--fg); letter-spacing: 1px; }
  .media-frame img, .media-frame video { display: block; max-width: 100%; max-height: 460px; }
  .media-meta { font-size: 11px; color: var(--fg-muted); margin-top: 6px; padding: 6px 8px; border-top: 1px dashed var(--border); word-break: break-all; display: flex; justify-content: space-between; align-items: center; }
  
  .tool-card {
    border: 1px solid var(--border-bright); padding: 14px; margin: 14px 0;
    background: var(--bg-panel); display: flex; gap: 16px; align-items: flex-start;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .tool-card img { width: 140px; height: 140px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .tool-card .info { flex: 1; }
  .tool-card h3 { color: var(--fg-bright); margin-bottom: 6px; font-size: 16px; }
  .tool-card p { color: var(--fg-muted); font-size: 12px; margin-bottom: 8px; }
  .tool-card .rating { color: var(--warn); font-weight: 700; }
  .tool-card .badge { display: inline-block; background: var(--border); padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-right: 4px; color: var(--accent); }

  .btn {
    display: inline-block; background: var(--fg); color: var(--bg); padding: 6px 12px;
    text-decoration: none; font-weight: 700; font-size: 12px; border-radius: 2px;
    margin-top: 8px; margin-right: 8px; transition: transform 0.1s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 0 10px var(--fg); }
  .btn.secondary { background: transparent; border: 1px solid var(--fg); color: var(--fg); }
  .btn.download { background: var(--accent); color: #000; }

  .spinner { display: inline-block; color: var(--fg); }
  .spinner::after { content: '⠋'; animation: spin 0.8s steps(8) infinite; display: inline-block; font-size: 14px; }
  @keyframes spin { 0% { content: '⠋'; } 12.5% { content: '⠙'; } 25% { content: '⠹'; } 37.5% { content: '⠸'; } 50% { content: '⠼'; } 62.5% { content: '⠴'; } 75% { content: '⠦'; } 87.5% { content: '⠧'; } 100% { content: '⠇'; } }
  .thinking-dots::after { content: '●○○'; animation: thinkDots 1.2s infinite; color: var(--fg-dim); letter-spacing: 2px; }
  @keyframes thinkDots { 0%, 33% { content: '●○○'; color: var(--fg); } 34%, 66% { content: '○●○'; color: var(--fg); } 67%, 100% { content: '○○●'; color: var(--fg); } }
  
  .input-wrapper { border-top: 1px solid var(--border); background: var(--bg-input); flex-shrink: 0; position: relative; }
  .input-hint { font-size: 11px; color: var(--fg-muted); padding: 6px 22px 2px; display: flex; gap: 10px; flex-wrap: wrap; }
  .input-hint .cmd { color: var(--accent); }
  .input-area { padding: 10px 22px 14px; display: flex; align-items: center; gap: 10px; }
  .prompt-symbol { color: var(--accent); font-weight: 700; text-shadow: 0 0 6px var(--accent); font-size: 16px; }
  .prompt-symbol.busy { color: var(--warn); text-shadow: 0 0 6px var(--warn); }
  .prompt-symbol.prompt { color: var(--magenta); text-shadow: 0 0 6px var(--magenta); }
  .input-field { flex: 1; background: transparent; border: none; outline: none; color: var(--fg-bright); font-family: 'JetBrains Mono', monospace; font-size: 14px; caret-color: var(--fg); }
  .input-field::placeholder { color: var(--fg-dim); } .input-field:disabled { opacity: 0.5; }
  
  .autocomplete-box { display: none; position: absolute; bottom: 60px; left: 22px; right: 22px; max-height: 240px; overflow-y: auto; background: var(--bg-panel); border: 1px solid var(--border-bright); box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 50; flex-direction: column; }
  .ac-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .ac-item.active { background: color-mix(in srgb, var(--fg) 12%, transparent); }
  .ac-icon { font-size: 16px; width: 24px; text-align: center; color: var(--accent); }
  .ac-content { flex: 1; }
  .ac-title { color: var(--fg-bright); font-size: 13px; }
  .ac-desc { color: var(--fg-muted); font-size: 11px; }
  .ac-thumb { width: 32px; height: 32px; object-fit: cover; border: 1px solid var(--border-bright); }

  .help-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
  .help-table td { padding: 5px 14px; border-bottom: 1px dashed var(--border); vertical-align: top; }
  .help-table td:first-child { color: var(--accent); white-space: nowrap; width: 1%; font-weight: 500; }
  .help-table td:last-child { color: var(--fg-muted); }
  .help-section { color: var(--fg-bright); font-weight: 700; margin: 12px 0 4px; padding: 2px 0; border-bottom: 1px solid var(--border); }
  a { color: var(--accent); text-decoration: underline; text-decoration-style: dotted; } a:hover { text-shadow: 0 0 5px var(--accent); }
  strong { color: var(--fg-bright); font-weight: 700; }
  .tag { display: inline-block; padding: 1px 6px; border: 1px solid var(--border-bright); font-size: 10px; color: var(--fg); margin-right: 4px; }
  .tag.tool { color: var(--warn); border-color: var(--warn); }
  ::selection { background: var(--fg); color: var(--bg); }
</style>
</head>
<body class="theme-green">
<div class="crt-overlay"></div><div class="crt-vignette"></div><div class="crt-flicker"></div>

<div id="terminal">
  <header class="header">
    <div class="header-left">
      <div class="logo">As OS</div>
      <div class="status-item"><span class="status-dot" id="statusDot"></span><span id="statusText">ONLINE</span></div>
      <div class="status-item"><span>MODEL:</span><span style="color: var(--fg-bright)" id="modelText">agnes-2.0-flash</span></div>
    </div>
    <div class="header-right">
      <div class="status-item"><span>TEMP:</span><span id="tempText">0.7</span></div>
      <div class="status-item"><span>MSG:</span><span id="ctxCount">0</span></div>
      <div class="status-item"><span id="clock">00:00:00</span></div>
    </div>
  </header>
  <main class="output" id="output"></main>
  <div class="input-wrapper">
    <div class="autocomplete-box" id="autocompleteBox"></div>
    <div class="input-hint">
      <span><span class="cmd">/help</span> cmds</span>
      <span><span class="cmd">@id</span> ref media</span>
      <span><span class="cmd">/yt</span> download</span>
      <span><span class="cmd">/movie</span> database</span>
      <span><span class="cmd">/search</span> web</span>
      <span><span class="cmd">/mail</span> temp mail</span>
    </div>
    <div class="input-area">
      <span class="prompt-symbol" id="promptSymbol">▸</span>
      <input type="text" class="input-field" id="input" placeholder="Type a message, / for cmds, @ for refs..." autocomplete="off" autofocus>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════
const API_KEY = 'sk-xC8TdHdVA6Iy797q4U4uhPsa5SPt5gI3osko9DsSWYaa3a0y';
const API_BASE = 'https://apihub.agnes-ai.com';

let conversationHistory = [];
let currentModel = 'agnes-2.0-flash';
let temperature = 0.7;
let systemPrompt = 'You are AS, an AI assistant operating in a retro terminal interface called "As OS". Be concise, technical, and helpful. Use markdown: fenced code blocks with language tags, inline code with backticks, bold with **. Keep responses focused unless detail is requested. If you need real-time info, use tools.';
let isProcessing = false;
let commandHistory = [];
let historyIndex = -1;
let bootDone = false;
let currentTheme = 'green';
let assets = []; 
let interactiveCallback = null;
let acState = { type: null, items: [], activeIndex: 0 };

const AVAILABLE_TOOLS = [
  {
    type: "function",
    function: {
      name: "get_current_datetime",
      description: "Get the current exact date and time.",
      parameters: { type: "object", properties: {} }
    }
  },
  {
    type: "function",
    function: {
      name: "web_search",
      description: "Search the web for real-time information using Jina AI.",
      parameters: { type: "object", properties: { query: { type: "string", description: "The search query" } }, required: ["query"] }
    }
  },
  {
    type: "function",
    function: {
      name: "read_url",
      description: "Read the content of a specific URL using Jina AI Reader.",
      parameters: { type: "object", properties: { url: { type: "string", description: "The URL to read" } }, required: ["url"] }
    }
  },
  {
    type: "function",
    function: {
      name: "shorten_url",
      description: "Shorten a long URL.",
      parameters: { type: "object", properties: { url: { type: "string", description: "The long URL to shorten" } }, required: ["url"] }
    }
  },
  {
    type: "function",
    function: {
      name: "create_temp_email",
      description: "Generate a temporary email address.",
      parameters: { type: "object", properties: {} }
    }
  }
];

const COMMANDS_LIST = [
  { cmd: '/help', desc: 'Show all commands' },
  { cmd: '/image', desc: 'Generate image (asks for size)' },
  { cmd: '/image2', desc: 'High-density image gen' },
  { cmd: '/video', desc: 'Generate video (asks size & duration)' },
  { cmd: '/look', desc: 'Vision: analyze image (@id or URL)' },
  { cmd: '/think', desc: 'Chat with visible thinking process' },
  { cmd: '/search', desc: 'Search web via Jina AI' },
  { cmd: '/read', desc: 'Read URL content via Jina AI' },
  { cmd: '/yt', desc: 'YouTube video downloader' },
  { cmd: '/movie', desc: 'Movie database (IMDb)' },
  { cmd: '/mail', desc: 'Generate temp email address' },
  { cmd: '/shorten', desc: 'Shorten a URL' },
  { cmd: '/weather', desc: 'Get weather via tool calling' },
  { cmd: '/gallery', desc: 'List all generated assets' },
  { cmd: '/temp', desc: 'Set temperature (0-2)' },
  { cmd: '/theme', desc: 'Change theme: green, amber, cyan, matrix' },
  { cmd: '/clear', desc: 'Clear terminal output' },
  { cmd: '/reset', desc: 'Reset conversation history' },
  { cmd: '/neofetch', desc: 'System information display' },
  { cmd: '/reboot', desc: 'Reboot the terminal' }
];

// ═══════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════
const output = document.getElementById('output');
const input = document.getElementById('input');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const ctxCount = document.getElementById('ctxCount');
const clock = document.getElementById('clock');
const promptSymbol = document.getElementById('promptSymbol');
const tempText = document.getElementById('tempText');
const acBox = document.getElementById('autocompleteBox');

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function updateClock() {
  const n = new Date();
  clock.textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateClock, 1000); updateClock();

function appendLine(text, type = '') {
  const line = document.createElement('div');
  line.className = `line ${type}`;
  line.textContent = text;
  output.appendChild(line); output.scrollTop = output.scrollHeight; return line;
}
function appendHTML(html, className = '') {
  const div = document.createElement('div');
  div.className = className; div.innerHTML = html;
  output.appendChild(div); output.scrollTop = output.scrollHeight; return div;
}

function setStatus(status) {
  statusDot.className = 'status-dot';
  promptSymbol.classList.remove('busy', 'prompt');
  if (status === 'busy') {
    statusDot.classList.add('busy'); statusText.textContent = 'PROCESSING';
    promptSymbol.classList.add('busy'); input.disabled = true;
  } else if (status === 'error') {
    statusDot.classList.add('error'); statusText.textContent = 'ERROR'; input.disabled = false;
  } else if (status === 'tool') {
    statusDot.classList.add('tool'); statusText.textContent = 'TOOL CALL'; promptSymbol.classList.add('prompt'); input.disabled = false;
  } else if (status === 'prompt') {
    statusDot.classList.add('busy'); statusText.textContent = 'AWAITING INPUT'; promptSymbol.classList.add('prompt'); input.disabled = false;
  } else {
    statusText.textContent = 'ONLINE'; input.disabled = false;
  }
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => `<div class="code-block" data-lang="${lang || 'code'}">${code.trim()}</div>`);
  html = html.replace(/`([^`\n]+)`/g, '<span class="code-inline">$1</span>');
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^### (.+)$/gm, '<div style="color:var(--accent);font-weight:700;margin:8px 0 4px">$1</div>');
  html = html.replace(/^## (.+)$/gm, '<div style="color:var(--accent);font-weight:700;font-size:15px;margin:10px 0 4px">$1</div>');
  html = html.replace(/^# (.+)$/gm, '<div style="color:var(--accent);font-weight:700;font-size:16px;margin:10px 0 4px">$1</div>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  html = html.replace(/(^|[^"=])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank">$2</a>');
  html = html.replace(/^[-*] (.+)$/gm, '<div style="padding-left:16px;color:var(--fg)">• $1</div>');
  return html;
}

// ═══════════════════════════════════════════════════════════
// AUTOCOMPLETE LOGIC
// ═══════════════════════════════════════════════════════════
function checkAutocomplete() {
  const val = input.value;
  const cursorPos = input.selectionStart;
  const textBeforeCursor = val.substring(0, cursorPos);
  const match = textBeforeCursor.match(/(?:^|\s)(\/|@)([^\s]*)$/);
  
  if (match) {
    const prefix = match[1];
    const query = match[2];
    if (prefix === '/') {
      acState.type = 'command';
      acState.items = COMMANDS_LIST.filter(c => c.cmd.startsWith('/' + query));
    } else if (prefix === '@') {
      acState.type = 'asset';
      acState.items = assets.filter(a => a.id.toString().startsWith(query));
    }
    if (acState.items.length > 0) {
      acState.activeIndex = 0;
      renderAutocomplete();
      return;
    }
  }
  hideAutocomplete();
}

function renderAutocomplete() {
  acBox.innerHTML = '';
  acState.items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'ac-item' + (idx === acState.activeIndex ? ' active' : '');
    if (acState.type === 'command') {
      div.innerHTML = `<div class="ac-icon">▸</div><div class="ac-content"><div class="ac-title">${item.cmd}</div><div class="ac-desc">${item.desc}</div></div>`;
    } else {
      const thumb = item.type === 'image' ? `<img src="${item.url}" class="ac-thumb" alt="">` : `<div class="ac-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--magenta);font-size:10px;">VID</div>`;
      div.innerHTML = `${thumb}<div class="ac-content"><div class="ac-title">@${item.id} [${item.type.toUpperCase()}]</div><div class="ac-desc">${escapeHtml(item.prompt.substring(0, 60))}</div></div>`;
    }
    div.addEventListener('click', () => applyAutocomplete(idx));
    acBox.appendChild(div);
  });
  acBox.style.display = 'flex';
}

function applyAutocomplete(idx) {
  if (idx === undefined) idx = acState.activeIndex;
  const item = acState.items[idx];
  if (!item) return;
  const val = input.value;
  const cursorPos = input.selectionStart;
  const textBeforeCursor = val.substring(0, cursorPos);
  const insertText = acState.type === 'command' ? item.cmd + ' ' : '@' + item.id + ' ';
  const match = textBeforeCursor.match(/(?:^|\s)(\/|@)([^\s]*)$/);
  const wordStart = match.index + (match[0].length - match[1].length - match[2].length);
  input.value = val.substring(0, wordStart) + insertText + val.substring(cursorPos);
  input.focus();
  const newCursorPos = wordStart + insertText.length;
  input.setSelectionRange(newCursorPos, newCursorPos);
  hideAutocomplete();
}

function hideAutocomplete() { acBox.style.display = 'none'; acState.type = null; acState.items = []; }

// ═══════════════════════════════════════════════════════════
// ASSET & URL RESOLUTION
// ═══════════════════════════════════════════════════════════
function addAsset(type, url, prompt) {
  const id = assets.length + 1;
  assets.push({ id, type, url, prompt });
  appendLine(`[SYSTEM] Saved as asset @${id}`, 'success');
  return id;
}

function resolveReferences(text) {
  const idMatches = [...text.matchAll(/@(\d+)/g)];
  const urlMatches = [...text.matchAll(/(https?:\/\/[^\s]+)/g)];
  const urls = []; const refs = []; let cleanText = text;
  idMatches.forEach(m => {
    const id = parseInt(m[1]);
    const asset = assets.find(a => a.id === id);
    if (asset) { urls.push(asset.url); refs.push(asset); cleanText = cleanText.replace(m[0], `[Reference @${id}]`); }
  });
  urlMatches.forEach(m => {
    if (!urls.includes(m[0])) { urls.push(m[0]); refs.push({ type: 'url', url: m[0], id: 'URL' }); cleanText = cleanText.replace(m[0], `[Reference URL]`); }
  });
  return { urls, text: cleanText, refs };
}

// TOOL EXECUTION
// ═══════════════════════════════════════════════════════════
async function executeToolCall(name, args) {
  appendLine(`[TOOL] Executing: ${name}(${JSON.stringify(args)})`, 'info');
  try {
    if (name === 'get_current_datetime') return new Date().toString();
    if (name === 'web_search') {
      const res = await fetch(`https://s.jina.ai/${encodeURIComponent(args.query)}`);
      return await res.text();
    }
    if (name === 'read_url') {
      const res = await fetch(`https://r.jina.ai/${args.url}`);
      return await res.text();
    }
    if (name === 'shorten_url') {
      const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(args.url)}`);
      const data = await res.json();
      return data.shorturl || 'Failed to shorten URL';
    }
    if (name === 'create_temp_email') {
      const res = await fetch('https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1');
      const data = await res.json();
      return data[0] || 'Failed to generate email';
    }
  } catch (e) { return `Tool execution failed: ${e.message}`; }
  return "Tool not found";
}

// ═══════════════════════════════════════════════════════════
// CHAT WITH TOOLS & THINKING
// ═══════════════════════════════════════════════════════════
async function chat(userMessage, visionContent = null, enableThinking = false) {
  conversationHistory = conversationHistory.filter(m => m.role !== 'system');
  conversationHistory.unshift({ role: 'system', content: systemPrompt });
  
  if (visionContent) conversationHistory.push({ role: 'user', content: visionContent });
  else conversationHistory.push({ role: 'user', content: userMessage });
  
  ctxCount.textContent = conversationHistory.filter(m => m.role !== 'system').length;
  
  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'line assistant';
  const prefix = document.createElement('span');
  prefix.className = 'assistant-prefix'; prefix.textContent = 'as▸';
  assistantDiv.appendChild(prefix);
  const contentSpan = document.createElement('span');
  assistantDiv.appendChild(contentSpan);
  const cursor = document.createElement('span');
  cursor.className = 'tw-cursor';
  assistantDiv.appendChild(cursor);
  output.appendChild(assistantDiv);
  output.scrollTop = output.scrollHeight;
  
  contentSpan.innerHTML = '<span class="thinking-dots"></span>';
  setStatus('busy');

  try {
    // Step 1: Non-streaming request to check for tool calls
    let payload = { model: currentModel, messages: conversationHistory, stream: false, temperature };
    if (enableThinking) payload.chat_template_kwargs = { enable_thinking: true };
    if (!visionContent) payload.tools = AVAILABLE_TOOLS;

    let res = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    let data = await res.json();
    let msg = data.choices[0].message;

    // Step 2: Execute tools if any
    if (msg.tool_calls && msg.tool_calls.length > 0) {
      cursor.remove();
      contentSpan.innerHTML = '<span style="color:var(--magenta)">[Initiating Tool Call...]</span>';
      setStatus('tool');
      conversationHistory.push(msg); // Save assistant tool call request
      
      for (let toolCall of msg.tool_calls) {
        const args = JSON.parse(toolCall.function.arguments);
        const result = await executeToolCall(toolCall.function.name, args);
        appendLine(`[TOOL] Result received.`, 'success');
        conversationHistory.push({ role: "tool", tool_call_id: toolCall.id, name: toolCall.function.name, content: result });
      }
      
      // Step 3: Final streaming request with tool results
      contentSpan.innerHTML = '';
      assistantDiv.appendChild(cursor);
      setStatus('busy');
      
      payload = { model: currentModel, messages: conversationHistory, stream: true, temperature };
      if (enableThinking) payload.chat_template_kwargs = { enable_thinking: true };
      
      res = await fetch(`${API_BASE}/v1/chat/completions`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      // No tool calls, just simulate streaming the content we already got
      // To make it feel live, we'll fake a stream by chunking the text
      const textToStream = msg.content || "";
      msg.content = ""; // Reset for streaming parser
      const fakeStream = async () => {
        const chunks = textToStream.match(/.{1,5}/g) || [];
        const encoder = new TextEncoder();
        const stream = new ReadableStream({
          start(controller) {
            chunks.forEach(c => controller.enqueue(encoder.encode(`data: ${JSON.stringify({choices:[{delta:{content:c}}]})}\n\n`)));
            controller.enqueue(encoder.encode('data: [DONE]\n\n'));
            controller.close();
          }
        });
        return new Response(stream);
      };
      res = await fakeStream();
    }

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', fullResponse = '', firstToken = true;
    let thinkBox = null, thinkContent = null;
    let isThinking = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      
      for (let line of lines) {
        const t = line.trim();
        if (!t || !t.startsWith('data:')) continue;
        const d = t.slice(5).trim();
        if (d === '[DONE]') continue;
        try {
          const parsed = JSON.parse(d);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          if (delta) {
            if (firstToken) { contentSpan.innerHTML = ''; firstToken = false; }
            fullResponse += delta;
            
            // Parse <think tags
            if (fullResponse.includes("<think") && !fullResponse.includes("</think")) {
              if (!thinkBox) {
                thinkBox = document.createElement('div');
                thinkBox.className = 'think-box';
                thinkContent = document.createElement('div');
                thinkContent.className = 'think-content';
                thinkBox.appendChild(thinkContent);
                contentSpan.appendChild(thinkBox);
              }
              const currentThink = fullResponse.split("<think")[1].replace(/^[^>]*>/, '');
              thinkContent.textContent = currentThink;
            } else if (fullResponse.includes("</think")) {
              // Done thinking, render main text
              const parts = fullResponse.split("</think");
              if (thinkContent && parts[0]) {
                thinkContent.textContent = parts[0].split("<think")[1].replace(/^[^>]*>/, '');
              }
              const mainText = parts[1] || "";
              // Remove old main content and set new
              let existingMain = contentSpan.querySelector('.main-output');
              if (!existingMain) {
                existingMain = document.createElement('div');
                existingMain.className = 'main-output';
                contentSpan.appendChild(existingMain);
              }
              existingMain.innerHTML = renderMarkdown(mainText);
            } else {
              let existingMain = contentSpan.querySelector('.main-output');
              if (!existingMain) {
                existingMain = document.createElement('div');
                existingMain.className = 'main-output';
                contentSpan.appendChild(existingMain);
              }
              existingMain.innerHTML = renderMarkdown(fullResponse);
            }
            output.scrollTop = output.scrollHeight;
          }
        } catch (e) {}
      }
    }
    
    cursor.remove();
    if (!fullResponse) contentSpan.innerHTML = '<span style="color:var(--warn)">(empty response)</span>';
    
    // Clean up tags before saving to history
    const cleanResponse = fullResponse.replace(/<think[\s\S]*?<\/think>/g, '').trim();
    conversationHistory.push({ role: 'assistant', content: cleanResponse });
    ctxCount.textContent = conversationHistory.filter(m => m.role !== 'system').length;
    setStatus('online');
    
  } catch (error) {
    cursor.remove();
    contentSpan.innerHTML = `<span style="color:var(--err)">[ERROR] ${escapeHtml(error.message)}</span>`;
    setStatus('error');
    setTimeout(() => setStatus('online'), 3000);
    conversationHistory.pop();
    ctxCount.textContent = conversationHistory.filter(m => m.role !== 'system').length;
  }
}

async function generateImageFlow(prompt, model) {
  const { urls, text, refs } = resolveReferences(prompt);
  appendLine('[IMAGE] Select output size:', 'prompt');
  ['1. 1024x1024', '2. 1280x720', '3. 720x1280', '4. 1024x768', '5. 768x1024'].forEach(o => appendLine(`  ${o}`, 'system'));
  setStatus('prompt');
  interactiveCallback = async (choice) => {
    setStatus('online');
    let size = '1024x1024';
    if (choice === '2') size = '1280x720'; else if (choice === '3') size = '720x1280';
    else if (choice === '4') size = '1024x768'; else if (choice === '5') size = '768x1024';
    else if (/^\d+x\d+$/.test(choice)) size = choice;
    
    appendLine(`[IMAGE] Gen init... Model: ${model}, Size: ${size}`, 'info');
    const spin = appendHTML('<span class="spinner"></span> Rendering...');
    setStatus('busy');
    try {
      const body = { model, prompt: text, size, extra_body: { response_format: 'url' } };
      if (urls.length > 0) body.extra_body.image = urls;
      const res = await fetch(`${API_BASE}/v1/images/generations`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      spin.remove();
      if (data.data?.[0]?.url) {
        const url = data.data[0].url;
        const id = addAsset('image', url, text);
        appendHTML(`<div class="media-frame" data-type="IMAGE" data-id="${id}"><img src="${url}" alt="Generated image"><div class="media-meta"><span>Model: ${model} | Size: ${size}</span><a href="${url}" download class="btn secondary">Download</a></div></div>`);
        appendLine(`[IMAGE] Complete.`, 'success');
      } else throw new Error('No image URL');
    } catch (e) { spin.remove(); appendLine(`[ERROR] ${e.message}`, 'error'); setStatus('error'); setTimeout(() => setStatus('online'), 3000); }
  };
}

async function generateVideoFlow(prompt) {
  const { urls, text, refs } = resolveReferences(prompt);
  appendLine('[VIDEO] Select resolution:', 'prompt');
  ['1. 1152x768 (16:9)', '2. 768x1152 (9:16)', '3. 768x768 (1:1)'].forEach(o => appendLine(`  ${o}`, 'system'));

    if (resChoice === '2') { w = 768; h = 1152; } else if (resChoice === '3') { w = 768; h = 768; }
    appendLine('[VIDEO] Select duration:', 'prompt');
    ['1. ~3s (81 frames)', '2. ~5s (121 frames)', '3. ~10s (241 frames)'].forEach(o => appendLine(`  ${o}`, 'system'));
    setStatus('prompt');
    interactiveCallback = async (durChoice) => {
      setStatus('online');
      let frames = 121;
      if (durChoice === '1') frames = 81; else if (durChoice === '3') frames = 241;
      
      appendLine(`[VIDEO] Gen init... Size: ${w}x${h}, Frames: ${frames}`, 'info');
      const spin = appendHTML('<span class="spinner"></span> Creating task...');
      setStatus('busy');
      try {
        const body = { model: 'agnes-video-v2.0', prompt: text, width: w, height: h, num_frames: frames, frame_rate: 24 };
        if (urls[0]) body.image = urls[0];
        let res = await fetch(`${API_BASE}/v1/videos`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let data = await res.json();
        spin.remove();
        const videoId = data.video_id;
        appendLine(`[VIDEO] Task ID: ${videoId}`, 'success');
        
        const prog = appendHTML(`<div class="progress-container"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div><div class="progress-text">0% - Queued</div></div></div>`);
        
        let attempts = 0;
        while (attempts < 120) {
          await new Promise(r => setTimeout(r, 5000)); attempts++;
          try {
            const sRes = await fetch(`${API_BASE}/agnesapi?video_id=${videoId}`, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
            if (!sRes.ok) continue;
            const sData = await sRes.json();
            const p = sData.progress || 0;
            prog.querySelector('.progress-fill').style.width = `${p}%`;
            prog.querySelector('.progress-text').textContent = `${p}% - ${sData.status}`;
            if (sData.status === 'completed') {
              const vUrl = sData.remixed_from_video_id;
              prog.remove();
              const id = addAsset('video', vUrl, text);
              appendHTML(`<div class="media-frame" data-type="VIDEO" data-id="${id}"><video src="${vUrl}" controls autoplay loop muted playsinline></video><div class="media-meta"><span>Duration: ${sData.seconds}s</span><a href="${vUrl}" download class="btn download">Download MP4</a></div></div>`);
              appendLine(`[VIDEO] Complete.`, 'success');
              setStatus('online');
              return;
            }
            if (sData.status === 'failed') throw new Error('Generation failed');
          } catch (e) {}
        }
        throw new Error('Timeout');
      } catch (e) { spin.remove(); appendLine(`[ERROR] ${e.message}`, 'error'); setStatus('error'); setTimeout(() => setStatus('online'), 3000); }
    };
  };
}

    el.className = 'line ' + (t.includes('[ OK ]') ? 'success' : 'system');
    output.appendChild(el);
    for (let i = 0; i < t.length; i++) { el.textContent += t[i]; if (i % 3 === 0) output.scrollTop = output.scrollHeight; await new Promise(r => setTimeout(r, 4)); }
    await new Promise(r => setTimeout(r, 30));
  }
  
  appendLine('Welcome to As OS v4.0. Type /help to see commands.', 'info');
  appendLine('Features: Tool Calling, Visible Thinking, Media Gen, Web Search, YT Download.', 'info');
  appendLine('', 'system');
  bootDone = true;
  input.focus();
}

// ═══════════════════════════════════════════════════════════
// PROCESS INPUT
// ═══════════════════════════════════════════════════════════
async function processInput(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  commandHistory.push(trimmed);
  historyIndex = commandHistory.length;
  appendLine(trimmed, 'user');
  
  if (trimmed.startsWith('/')) {
    const spaceIdx = trimmed.indexOf(' ');
    const cmd = (spaceIdx === -1 ? trimmed.slice(1) : trimmed.slice(1, spaceIdx)).toLowerCase();
    const arg = spaceIdx === -1 ? '' : trimmed.slice(spaceIdx + 1).trim();
    
    switch (cmd) {
      case 'help': case 'h': case '?': showHelp(); break;
      case 'image': case 'img':
        if (!arg) { appendLine('[ERROR] Usage: /image [@id|url] <prompt>', 'error'); break; }
        await generateImageFlow(arg, 'agnes-image-2.0-flash'); break;
      case 'image2': case 'img2':
        if (!arg) { appendLine('[ERROR] Usage: /image2 [@id|url] <prompt>', 'error'); break; }
        await generateImageFlow(arg, 'agnes-image-2.1-flash'); break;
      case 'video': case 'vid':
        if (!arg) { appendLine('[ERROR] Usage: /video [@id|url] <prompt>', 'error'); break; }
        await generateVideoFlow(arg); break;
      case 'look': case 'vision': case 'see':
        if (!arg) { appendLine('[ERROR] Usage: /look <@id|url> <question>', 'error'); break; }
        const { urls, text: cleanText } = resolveReferences(arg);
        if (urls.length > 0) {
          await chat(cleanText, [{ type: 'text', text: cleanText }, ...urls.map(url => ({ type: 'image_url', image_url: { url } }))]);
        } else { appendLine('[ERROR] No image reference found.', 'error'); }
        break;
      case 'think':
        if (!arg) { appendLine('[ERROR] Usage: /think <message>', 'error'); break; }
        await chat(arg, null, true); break;
      case 'search': await searchCommand(arg); break;
      case 'read': await readCommand(arg); break;
      case 'yt': await ytCommand(arg); break;
      case 'movie': await movieCommand(arg); break;
      case 'mail': await mailCommand(); break;
      case 'shorten': await shortenCommand(arg); break;
      case 'weather':
        await chat(`What is the weather like in ${arg}?`); break;
      case 'ask':
        if (!arg) { appendLine('[ERROR] Usage: /ask <question>', 'error'); break; }
        const saved = [...conversationHistory];
        conversationHistory = [];
        await chat(arg);
        conversationHistory = saved;
        break;
      case 'joke': await chat("Tell me a short, clever programming joke."); break;
      case 'gallery': case 'assets':
        if (assets.length === 0) { appendLine('[GALLERY] No assets generated yet.', 'system'); break; }
        appendLine('═══ GENERATED ASSETS ═══', 'info');
        assets.forEach(a => {
          const thumb = a.type === 'image' ? `<img src="${a.url}" style="width:60px;height:60px;object-fit:cover;">` : `<video src="${a.url}" muted style="width:60px;height:60px;object-fit:cover;"></video>`;
          appendHTML(`<div class="asset-card">${thumb}<div class="info"><div class="id">@${a.id} [${a.type.toUpperCase()}]</div><div class="prompt">${escapeHtml(a.prompt.substring(0, 100))}</div></div></div>`);
        });
        break;
      case 'temp': case 'temperature':
        if (!arg) appendLine(`[CONFIG] Current temperature: ${temperature.toFixed(1)}`, 'info');
        else { const t = parseFloat(arg); if (isNaN(t) || t < 0 || t > 2) { appendLine('[ERROR] Must be 0-2.', 'error'); } else { temperature = t; tempText.textContent = t.toFixed(1); appendLine(`[CONFIG] Temp set to ${t.toFixed(1)}.`, 'success'); } }
        break;
      case 'theme':
        if (!arg) appendLine(`[CONFIG] Theme: ${currentTheme}. Options: green, amber, cyan, matrix`, 'info');
        else { const themes = ['green', 'amber', 'cyan', 'matrix']; if (themes.includes(arg.toLowerCase())) { document.body.className = `theme-${arg.toLowerCase()}`; currentTheme = arg.toLowerCase(); appendLine(`[CONFIG] Theme: ${arg}`, 'success'); } else { appendLine('[ERROR] Invalid theme.', 'error'); } }
        break;
      case 'clear': case 'cls': output.innerHTML = ''; appendLine('[SYSTEM] Terminal cleared.', 'system'); break;
      case 'reset': conversationHistory = []; ctxCount.textContent = '0'; appendLine('[SYSTEM] History reset.', 'success'); break;
      case 'neofetch':
        const uptime = Math.floor((Date.now() - window.performance.timeOrigin) / 1000);
        appendHTML(`<div class="neofetch-box" style="display:flex;gap:20px;"><pre class="ascii-art" style="font-size:10px;">       █████╗  ██████╗
      ██╔══██╗██╔════╝
      ███████║██║  ███╗
      ██╔══██║██║   ██║
      ██║  ██║╚██████╔╝
      ╚═╝  ╚═╝ ╚═════╝</pre><div><div>user@as-os</div><div>─────────────</div><div>OS: As OS v4.0.0</div><div>Kernel: agnes-2.0-flash</div><div>Uptime: ${Math.floor(uptime/3600)}h ${Math.floor((uptime%3600)/60)}m</div><div>Theme: ${currentTheme}</div><div>Assets: ${assets.length}</div></div></div>`);
        break;
      case 'reboot': output.innerHTML = ''; conversationHistory = []; assets = []; ctxCount.textContent = '0'; await bootSequence(); break;
      case 'cancel': if (interactiveCallback) { interactiveCallback = null; setStatus('online'); appendLine('[SYSTEM] Cancelled.', 'warn'); } else { appendLine('[SYSTEM] Nothing to cancel.', 'system'); } break;
      case 'exit': appendLine('[SYSTEM] Goodbye.', 'warn'); break;
      default: appendLine(`[ERROR] Unknown command: /${cmd}`, 'error');
    }
  } else {
    await chat(trimmed);
  }
}

// ═══════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
input.addEventListener('input', () => { if (!interactiveCallback) checkAutocomplete(); });

input.addEventListener('keydown', async (e) => {
  if (acState.items.length > 0) {
    if (e.key === 'ArrowDown') { e.preventDefault(); acState.activeIndex = (acState.activeIndex + 1) % acState.items.length; renderAutocomplete(); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); acState.activeIndex = (acState.activeIndex - 1 + acState.items.length) % acState.items.length; renderAutocomplete(); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); applyAutocomplete(); return; }
    if (e.key === 'Escape') { e.preventDefault(); hideAutocomplete(); return; }
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    if (!bootDone || (isProcessing && !interactiveCallback)) return;
    const value = input.value;
    input.value = '';
    hideAutocomplete();
    if (interactiveCallback) {
      appendLine(value, 'user');
      const cb = interactiveCallback;
      interactiveCallback = null;
      cb(value);
    } else {
      isProcessing = true;
      await processInput(value);
      isProcessing = false;
    }
    input.focus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (interactiveCallback) return;
    if (historyIndex > 0) { historyIndex--; input.value = commandHistory[historyIndex] || ''; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (interactiveCallback) return;
    if (historyIndex < commandHistory.length - 1) { historyIndex++; input.value = commandHistory[historyIndex] || ''; }
    else { historyIndex = commandHistory.length; input.value = ''; }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault(); output.innerHTML = '';
  } else if (e.key === 'c' && e.ctrlKey) {
    if (interactiveCallback) { e.preventDefault(); interactiveCallback = null; setStatus('online'); appendLine('^C', 'error'); appendLine('[SYSTEM] Cancelled.', 'warn'); }
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('a') && !e.target.closest('video') && !e.target.closest('button') && !e.target.closest('.ac-item')) input.focus();
});

bootSequence();
</script>
